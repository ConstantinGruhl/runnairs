name: weekly-summary
display_name: Weekly Sales Summary
description: |
  Pulls the workspace's open pipeline for a region, asks an LLM for a
  3-bullet summary, pauses for human approval, and emails the summary.
runtime: python3.12
entrypoint: main:run

inputs:
  region:
    type: string
    required: true
  recipient_email:
    type: string
    required: true

permissions:
  tools:
    - llm.complete
    - postgres.query
    - email.send
  secrets:
    - name: OPENAI_API_KEY
      scope: workspace

approvals:
  required_for:
    - email.send

limits:
  timeout_seconds: 60
  memory_mb: 256
  max_tokens: 5000
  max_cost_usd: 0.50
