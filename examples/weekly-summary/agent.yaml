name: weekly-summary
display_name: Weekly Sales Summary
description: |
  Summarizes weekly pipeline activity for a region, then asks a human
  to approve before emailing the summary out. Phase 7 wires in
  approvals and email; Phase 8 will replace the LLM-fabricated
  pipeline with a real tools.postgres.query.
runtime: python3.12
entrypoint: main:run

inputs:
  region:
    type: string
    required: true
  recipient_email:
    type: string
    required: true

permissions:
  tools:
    - llm.complete
    - email.send
  secrets:
    - name: OPENAI_API_KEY
      scope: workspace

approvals:
  required_for:
    - email.send

limits:
  timeout_seconds: 60
  memory_mb: 256
  max_tokens: 5000
  max_cost_usd: 0.50
